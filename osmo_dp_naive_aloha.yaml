version: 2
workflow:
  timeout:
    exec_timeout: 12h
    queue_timeout: 1h
  name: dp-naive-aloha-{{ task_short }}-h100-e60
  resources:
    default:
      cpu: 15
      gpu: 1
      memory: 64Gi
      platform: ovx-l40
      storage: 64Gi
  groups:
  - name: train-eval
    tasks:
    - name: run
      image: nvcr.io/nvidian/gear-n2-eval:2025.08.31
      lead: true
      command: ["bash"]
      args: ["/tmp/run.sh"]
      environment:
        TASK: "{{ task }}"
        MUJOCO_GL: "egl"
        DATA_ROOT: "/mnt/amlfs-04/home/linke/dp_naive_aloha_h100_e60_20260630/data"
        OUT_ROOT: "/mnt/amlfs-04/home/linke/dp_naive_aloha_h100_e60_20260630/runs"
        PRED_HORIZON: "100"
        EXEC_HORIZON: "60"
        EPOCHS: "1000"
        ROLLOUTS: "50"
      files:
      - path: /tmp/run.sh
        contents: |
          set -euo pipefail
          ROOT=/osmo/run/workspace
          ACT_ROOT="$ROOT/act_aloha"
          ROBOMIMIC_ROOT="$ROOT/robomimic-SAIL"
          DATA_MARKER="$DATA_ROOT/.complete"
          echo "waiting for staged dataset marker: $DATA_MARKER"
          for _ in $(seq 1 720); do
            [ -f "$DATA_MARKER" ] && break
            sleep 5
          done
          test -f "$DATA_MARKER"
          git clone --depth 1 --branch codex/dp-naive-h100-e60-osmo-20260630 \
            https://github.com/kevin-thankyou-lin/act_aloha.git "$ACT_ROOT"
          git clone --depth 1 https://github.com/nadunRanawaka1/robomimic-SAIL.git "$ROBOMIMIC_ROOT"
          pip install -e "$ACT_ROOT/detr"
          pip install mujoco==2.3.3 dm-control==1.0.9 numpy==1.26.4 \
            diffusers torchvision einops h5py opencv-python pyquaternion tqdm ipython matplotlib
          export PYTHONPATH="$ROBOMIMIC_ROOT:${PYTHONPATH:-}"
          cd "$ACT_ROOT"
          bash run_dp_naive_aloha.sh

default-values:
  task: sim_transfer_cube_scripted
  task_short: transfer
